name: Frontend Linting

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**/*.ts'
      - 'pwa/**/*.tsx'
      - 'pwa/**/*.js'
      - 'pwa/**/*.jsx'
      - 'pwa/package.json'
      - 'pwa/pnpm-lock.yaml'
      - 'pwa/.eslintrc.json'
  pull_request:
    paths:
      - 'pwa/**/*.ts'
      - 'pwa/**/*.tsx'
      - 'pwa/**/*.js'
      - 'pwa/**/*.jsx'
      - 'pwa/package.json'
      - 'pwa/pnpm-lock.yaml'
      - 'pwa/.eslintrc.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_fe"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up pwa -d

      - name: Install dependencies
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa sh -c "cd /srv/app && rm -rf node_modules && pnpm install --frozen-lockfile"

      - name: Run ESLint
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa pnpm lint

  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_fe"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up pwa -d

      - name: Install dependencies
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa sh -c "cd /srv/app && rm -rf node_modules && pnpm install --frozen-lockfile"

      - name: Run TypeScript check
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa npx tsc --noEmit

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_fe"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up pwa -d

      - name: Install dependencies
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa sh -c "cd /srv/app && rm -rf node_modules && pnpm install --frozen-lockfile"

      - name: Run tests with coverage check (100% required)
        run: docker compose exec -T -e NODE_OPTIONS="--max-old-space-size=6144" pwa pnpm test:coverage:check

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./pwa/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
