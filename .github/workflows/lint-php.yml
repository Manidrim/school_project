name: PHP Linting

on:
  push:
    branches: [main]
    paths:
      - 'api/**/*.php'
      - 'api/composer.json'
      - 'api/composer.lock'
      - 'api/phpstan.neon'
      - 'api/phpmd.xml'
      - 'api/.php-cs-fixer.dist.php'
      - '.github/workflows/lint-php.yml'
  pull_request:
    paths:
      - 'api/**/*.php'
      - 'api/composer.json'
      - 'api/composer.lock'
      - 'api/phpstan.neon'
      - 'api/phpmd.xml'
      - 'api/.php-cs-fixer.dist.php'
      - '.github/workflows/lint-php.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  php-cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up php -d

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_cs_fixer"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
            echo "Swap space added: $SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Install dependencies
        run: docker compose exec -T php bash -c "export COMPOSER_MEMORY_LIMIT=-1 && composer install --no-interaction"

      - name: Run PHP CS Fixer (dry-run)
        run: docker compose exec -T php vendor/bin/php-cs-fixer fix --dry-run --verbose --diff

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up --wait --no-build

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_phpstan"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
            echo "Swap space added: $SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction

      - name: Warm up Symfony cache
        run: docker compose exec -T php bin/console cache:warmup

      - name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse --memory-limit=-1 --no-progress

  phpmd:
    name: PHPMD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up php -d

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_phpmd"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
            echo "Swap space added: $SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction

      - name: Run PHPMD
        run: docker compose exec -T php vendor/bin/phpmd src text phpmd.xml

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            *.cache-from=type=gha,scope=${{github.ref}}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{github.ref}},mode=max

      - name: Start services
        run: docker compose up --wait --no-build

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_coverage"
          if [ ! -f "$SWAPFILE" ]; then
            sudo fallocate -l 2G "$SWAPFILE"
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
            echo "Swap space added: $SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Install dependencies
        run: docker compose exec -T php composer install --no-interaction

      - name: Create test database
        run: docker compose exec -T php bin/console -e test doctrine:database:create

      - name: Run migrations
        run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction

      - name: Run tests with coverage check (100% required)
        run: |
          docker compose exec -T php bin/phpunit --coverage-clover var/coverage/clover.xml
          docker compose exec -T php php coverage-check.php

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./api/var/coverage/clover.xml
          flags: php
          name: php-coverage
